services:
  db:
    image: postgres:16
    container_name: family-budget-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-family_budget}
      POSTGRES_USER: ${DB_USERNAME:-family_budget_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_locally}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - family_budget_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-family_budget_user} -d ${DB_NAME:-family_budget}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  family_budget_pgdata:

